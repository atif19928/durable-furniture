<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamwear - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css styling/checkout.css">
        <link rel="stylesheet" href="../css styling/navbar.css">
</head>
<body>

<div class="container checkout-container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="custom-card">
                <h2 class="form-heading">Complete Your Order</h2>
                
                <form id="mainOrderForm">
                    <label>Full Name</label>
                    <input type="text" id="custName" class="my-input-field" placeholder="Enter name" required>

                    <label>Phone Number</label>
                    <input type="tel" id="custPhone" class="my-input-field" placeholder="03xx-xxxxxxx" required>

                    <label>Shipping Address</label>
                    <textarea id="custAddress" class="my-input-field" rows="3" placeholder="Street, City, House No." required></textarea>

                    <label>Select Payment</label>
                    <select id="custPayment" class="my-input-field" required>
                        <option  value="cod">Cash on Delivery</option>
                        <option value="online">Bank Transfer / Card</option>
                    </select>

                    <button type="submit" class="order-btn">Book My Order Now</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="../javascript/script.js"></script>

</body>
</html>
